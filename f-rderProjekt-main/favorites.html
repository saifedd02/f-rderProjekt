<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="utf-8" />
  <title>Meine Favoriten · mpool Förderprogramm-Finder</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body class="min-h-screen flex flex-col">
  <header>
    <div class="header-inner">
      <div class="header-left">
        <div class="logo-chip">
          <img src="https://www.mpool-consulting-do.de/wp-content/uploads/2020/05/cropped-cropped-mpool_consulting.png"
            alt="Mpool Consulting Logo" />
        </div>
        <div class="header-title-group">
          <h1>Meine Favoriten</h1>
          <p class="header-subline">Ihre gemerkten Förderprogramme</p>
        </div>
      </div>
      <nav class="header-actions">
        <a href="index.html" class="favorites-link">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
          </svg>
          <span>Zur Suche</span>
        </a>
      </nav>
    </div>
  </header>

  <main class="main-content favorites-page" style="max-width: 72rem;">
    <section class="favorites-grid" id="favoritesResults">
      <!-- Programme werden dynamisch eingefügt -->
    </section>
  </main>

  <footer>
    <div class="footer-inner">
      <span>© 2025 Mpool Consulting · Alle Rechte vorbehalten</span>
    </div>
  </footer>

  <script type="module" src="favorites.js"></script>
</body>

</html>
